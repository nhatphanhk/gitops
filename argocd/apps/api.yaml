apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: api
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/nhatphanhk/gitops.git
    path: k8s-api
  destination:
    server: https://kubernetes.default.svc
    namespace: demo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
  ignoreDifferences:
    # Argo Rollouts tự quản lý selector của api-canary service
    - group: ""
      kind: Service
      name: api-canary
      namespace: demo
      jsonPointers:
        - /spec/selector
    # rollouts-controller thêm analysisRunMetadata và các fields vào Rollout
    - group: argoproj.io
      kind: Rollout
      namespace: demo
      jqPathExpressions:
        - .spec.strategy.canary.analysis.analysisRunMetadata
      managedFieldsManagers:
        - rollouts-controller
