apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: backend
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/nhatphanhk/gitops.git
    path: k8s/backend
  destination:
    server: https://kubernetes.default.svc
    namespace: demo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
  # Ignore the selector field on canary service — Argo Rollouts manages it at runtime
  ignoreDifferences:
    - group: ""
      kind: Service
      name: backend-canary
      namespace: demo
      jsonPointers:
        - /spec/selector
