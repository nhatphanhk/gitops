apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: demo
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          # python:3.11-slim (~130MB) — pip install fastapi+uvicorn khi start
          image: python:3.11-slim
          command: ["/bin/sh", "-c"]
          args:
            - |
              pip install --no-cache-dir fastapi==0.111.0 "uvicorn[standard]==0.30.1" && \
              uvicorn main:app --host 0.0.0.0 --port 8000
          ports:
            - containerPort: 8000
          env:
            # Kubernetes Downward API — inject pod/node info vào env vars
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          # Lấy MESSAGE từ web-config ConfigMap (đã có sẵn)
          envFrom:
            - configMapRef:
                name: web-config
          volumeMounts:
            # Mount main.py từ ConfigMap → /app/main.py (subPath để chỉ mount 1 file)
            - name: code
              mountPath: /app/main.py
              subPath: main.py
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 25
            periodSeconds: 10
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
      volumes:
        - name: code
          configMap:
            name: backend-code
