apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-nginx
  namespace: demo
  annotations:
    argocd.argoproj.io/sync-wave: "0"
data:
  default.conf: |
    server {
        listen 80;
        root /usr/share/nginx/html;
        index index.html;

        # Dùng kube-dns resolver — nginx không crash khi backend chưa ready
        resolver kube-dns.kube-system.svc.cluster.local valid=5s ipv6=off;

        # Serve static files
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Proxy /api/* → backend service (dùng variable để lazy resolve DNS)
        location /api/ {
            set $backend_host backend.demo.svc.cluster.local;
            proxy_pass http://$backend_host/;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_connect_timeout 5s;
            proxy_read_timeout    30s;
        }
    }
