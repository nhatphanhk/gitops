apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: demo
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
          volumeMounts:
            # Nginx config — proxy /api/ → backend
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
            # Static files — index.html, style.css, app.js
            - name: static-files
              mountPath: /usr/share/nginx/html/index.html
              subPath: index.html
            - name: static-files
              mountPath: /usr/share/nginx/html/style.css
              subPath: style.css
            - name: static-files
              mountPath: /usr/share/nginx/html/app.js
              subPath: app.js
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: "20m"
              memory: "32Mi"
            limits:
              cpu: "100m"
              memory: "64Mi"
      volumes:
        - name: nginx-conf
          configMap:
            name: frontend-nginx
        - name: static-files
          configMap:
            name: frontend-files
